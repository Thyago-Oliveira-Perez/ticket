services:

  # --- Payment providers ---

  nubrank:
    build:
      context: ./payment_methods/nubrank
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ADDR: ":8080"
      DB_DSN: "postgres://nubrank:secret@postgresql:5432/nubrank?sslmode=disable"
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - ticket-net
    restart: unless-stopped


  # --- Infrastructure ---

  # nubrank database
  postgresql:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: nubrank
      POSTGRES_USER: nubrank
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nubrank -d nubrank"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ticket-net
    restart: unless-stopped

  mysql:
    image: mysql:9.3
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: ticket
      MYSQL_USER: ticket
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "ticket", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ticket-net
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ticket-net
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ticket
      RABBITMQ_DEFAULT_PASS: secret
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ticket-net
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:25.6-alpine
    environment:
      CLICKHOUSE_DB: ticket_analytics
      CLICKHOUSE_USER: ticket
      CLICKHOUSE_PASSWORD: secret
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # native interface
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ticket-net
    restart: unless-stopped

volumes:
  postgresql-data:
  mysql-data:
  redis-data:
  rabbitmq-data:
  clickhouse-data:

networks:
  ticket-net:
    driver: bridge
